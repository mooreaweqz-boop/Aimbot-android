<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POOH x KAO ADxIOS</title>
    
    <!-- ดึงฟอนต์ Mali แสนน่ารักมาจาก Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* กำหนดให้ใช้ฟอนต์ Mali ทั่วทั้งหน้าเว็บ */
            font-family: "Mali", cursive, sans-serif !important;
            font-weight: 600;
        }

        body {
            background: #000000;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* -----------------------------------------
           [1] AUTHENTICATION UI (หน้ากรอกคีย์)
        ----------------------------------------- */
        .auth-card {
            width: 100%;
            max-width: 380px;
            background: rgba(12, 12, 15, 0.95);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 0 0 35px rgba(239, 68, 68, 0.2);
            text-align: center;
        }

        .logo-circle {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 2px solid #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        .logo-circle img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }
        .brand-title span {
            color: #ef4444;
        }

        .welcome-subtext {
            color: #fca5a5;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .key-input {
            width: 100%;
            padding: 16px;
            background: rgba(22, 22, 26, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 0.95rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        .key-input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #dc2626, #ef4444);
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.5);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(239, 68, 68, 0.7);
        }

        /* -----------------------------------------
           [2] MAIN FILE SELECTOR UI (หน้าเลือกไฟล์)
        ----------------------------------------- */
        .main-card {
            display: none;
            width: 100%;
            max-width: 420px;
            background: rgba(13, 27, 42, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.25);
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .main-header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .main-header h2 {
            font-size: 1.4rem;
            color: #ffffff;
            font-weight: 700;
        }

        .main-header p {
            font-size: 0.8rem;
            color: #00f0ff;
        }

        .btn-logout {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .platform-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .platform-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .platform-btn.active {
            background: rgba(0, 240, 255, 0.15);
            border-color: #00f0ff;
            color: #00f0ff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
        }

        .drop-zone {
            border: 2px dashed rgba(0, 240, 255, 0.3);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            background: rgba(0, 240, 255, 0.01);
            transition: 0.3s;
        }

        .drop-zone:hover {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.05);
        }

        .file-info {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #38bdf8;
        }

        .hidden-input {
            display: none;
        }

        .btn-action {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(90deg, #0284c7, #00f0ff);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
    </style>
</head>
<body>

    <!-- [1] หน้าเข้าสู่ระบบ / กรอกคีย์ -->
    <div class="auth-card" id="auth-screen">
        <div class="logo-circle">
            <img src="https://cdn.discordapp.com/attachments/1528247158069792863/1528249908845351042/IMG_1880.png" alt="Logo">
        </div>

        <div class="brand-title">POOH x KAO <span>ADxIOS</span></div>
        <div class="welcome-subtext">✨ ยินดีต้อนรับ! กรุณายืนยันตัวตนนะ ✨</div>

        <div class="input-group">
            <input type="text" class="key-input" id="access-key" placeholder="🔑 กรอกคีย์เปิดใช้งานระบบที่นี่">
        </div>

        <button class="btn-submit" onclick="verifyKey()">เปิดระบบเลยยย 🚀</button>
    </div>

    <!-- [2] หน้าจัดการเลือกไฟล์ -->
    <div class="main-card" id="main-screen">
        <div class="main-header">
            <h2>POOH x KAO DASHBOARD</h2>
            <p id="key-status-text">สถานะ: กำลังใช้งาน</p>
            <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
        </div>

        <div class="platform-selector">
            <button class="platform-btn active" id="btn-android" onclick="setPlatform('android')">🤖 Android</button>
            <button class="platform-btn" id="btn-ios" onclick="setPlatform('ios')">🍎 iOS</button>
        </div>

        <div class="drop-zone" onclick="openFilePicker()">
            <div style="font-size: 2rem; margin-bottom: 8px;">📁</div>
            <div>เลือกไฟล์สำหรับระบบ <span id="current-platform" style="color:#00f0ff; font-weight:bold;">Android</span></div>
            <div class="file-info" id="file-name-display">ยังไม่ได้เลือกไฟล์</div>
        </div>

        <input type="file" id="input-android" class="hidden-input" accept=".zip,.bin,.json" onchange="handleFileSelect(this)">
        <input type="file" id="input-ios" class="hidden-input" accept=".zip,.plist,.json" onchange="handleFileSelect(this)">

        <button class="btn-action" onclick="runFile()">▶ รันไฟล์ที่เลือก</button>
    </div>

    <script>
        let currentPlatform = 'android';
        const keyPattern = /^pooh-\d*(day|hr|inf)-proxy\d{1,10}$/;

        window.onload = function() {
            const savedKey = localStorage.getItem('active_key');
            if (savedKey && keyPattern.test(savedKey)) {
                showMainScreen();
            }
        };

        function verifyKey() {
            const inputVal = document.getElementById('access-key').value.trim();

            if (keyPattern.test(inputVal)) {
                localStorage.setItem('active_key', inputVal);
                showMainScreen();
            } else {
                alert('รูปแบบคีย์ไม่ถูกต้อง!\nตัวอย่าง: pooh-1day-proxy1234 หรือ pooh-12hr-proxy1 หรือ pooh-inf-proxy99');
            }
        }

        function showMainScreen() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('active_key');
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('access-key').value = '';
        }

        function setPlatform(platform) {
            currentPlatform = platform;
            document.getElementById('btn-android').classList.toggle('active', platform === 'android');
            document.getElementById('btn-ios').classList.toggle('active', platform === 'ios');
            document.getElementById('current-platform').innerText = platform === 'android' ? 'Android' : 'iOS';
            document.getElementById('file-name-display').innerText = 'ยังไม่ได้เลือกไฟล์';
        }

        function openFilePicker() {
            if (currentPlatform === 'android') {
                document.getElementById('input-android').click();
            } else {
                document.getElementById('input-ios').click();
            }
        }

        function handleFileSelect(input) {
            const display = document.getElementById('file-name-display');
            if (input.files && input.files.length > 0) {
                display.innerText = "ไฟล์ที่เลือก: " + input.files[0].name;
            } else {
                display.innerText = "ยังไม่ได้เลือกไฟล์";
            }
        }

        function runFile() {
            const input = currentPlatform === 'android' 
                ? document.getElementById('input-android') 
                : document.getElementById('input-ios');

            if (input.files && input.files.length > 0) {
                alert(`โหลดไฟล์ ${input.files[0].name} สำหรับระบบ ${currentPlatform.toUpperCase()} เรียบร้อยแล้ว`);
            } else {
                alert('กรุณาเลือกไฟล์ก่อนกดรัน');
            }
        }
    </script>
</body>
</html>
