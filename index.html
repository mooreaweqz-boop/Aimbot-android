<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Selector Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Mali", cursive, sans-serif !important;
        }

        body {
            background: #090a0f;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .upload-card {
            width: 100%;
            max-width: 420px;
            background: rgba(13, 27, 42, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.25);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .card-title {
            font-size: 1.1rem;
            color: #00f0ff;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 700;
        }

        /* ปุ่มเลือกแพลตฟอร์ม (Android / iOS) */
        .platform-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .platform-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .platform-btn.active {
            background: rgba(0, 240, 255, 0.15);
            border-color: #00f0ff;
            color: #00f0ff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
        }

        /* โซนอัปโหลดไฟล์ */
        .drop-zone {
            border: 2px dashed rgba(0, 240, 255, 0.3);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            background: rgba(0, 240, 255, 0.01);
            transition: 0.3s;
        }

        .drop-zone:hover {
            background: rgba(0, 240, 255, 0.05);
            border-color: #00f0ff;
        }

        .drop-zone-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .drop-zone-text {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .selected-platform-tag {
            color: #00f0ff;
            font-weight: 700;
        }

        .file-info {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #38bdf8;
            font-weight: 600;
            word-break: break-all;
        }

        /* ซ่อน input ตัวจริง */
        .hidden-input {
            display: none;
        }

        .btn-action {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: linear-gradient(90deg, #0284c7, #00f0ff);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="upload-card">
        <div class="card-title">📁 ระบบเลือกและนำเข้าไฟล์</div>

        <!-- ปุ่มเลือกสลับแพลตฟอร์ม -->
        <div class="platform-selector">
            <button class="platform-btn active" id="btn-android" onclick="setPlatform('android')">
                🤖 Android
            </button>
            <button class="platform-btn" id="btn-ios" onclick="setPlatform('ios')">
                🍎 iOS
            </button>
        </div>

        <!-- กล่องคลิกเลือกไฟล์ -->
        <div class="drop-zone" onclick="openFilePicker()">
            <div class="drop-zone-icon">📥</div>
            <div class="drop-zone-text">
                คลิกเพื่อเลือกไฟล์สำหรับ <span id="current-platform-name" class="selected-platform-tag">Android</span>
            </div>
            <div class="file-info" id="file-name-display">ยังไม่ได้เลือกไฟล์</div>
        </div>

        <!-- Input ซ่อน (ใช้สำหรับ Android และ iOS แยกตามนามสกุลได้) -->
        <input type="file" id="input-android" class="hidden-input" accept=".zip,.bin,.json,.txt" onchange="handleFileSelect(this)">
        <input type="file" id="input-ios" class="hidden-input" accept=".zip,.plist,.json,.txt" onchange="handleFileSelect(this)">

        <button class="btn-action" onclick="processSelectedFile()">▶ ดำเนินการกับไฟล์</button>
    </div>

    <script>
        let currentPlatform = 'android';

        // สลับแพลตฟอร์มระหว่าง Android และ iOS
        function setPlatform(platform) {
            currentPlatform = platform;
            
            document.getElementById('btn-android').classList.toggle('active', platform === 'android');
            document.getElementById('btn-ios').classList.toggle('active', platform === 'ios');
            
            document.getElementById('current-platform-name').innerText = platform === 'android' ? 'Android' : 'iOS';
            document.getElementById('file-name-display').innerText = 'ยังไม่ได้เลือกไฟล์';
            
            // ล้างค่าอินพุตเมื่อสลับค่าย
            document.getElementById('input-android').value = '';
            document.getElementById('input-ios').value = '';
        }

        // เรียกเปิดตัวเลือกไฟล์ตามแพลตฟอร์มที่เลือก
        function openFilePicker() {
            if (currentPlatform === 'android') {
                document.getElementById('input-android').click();
            } else {
                document.getElementById('input-ios').click();
            }
        }

        // แสดงชื่อไฟล์เมื่อผู้ใช้เลือกไฟล์
        function handleFileSelect(input) {
            const nameDisplay = document.getElementById('file-name-display');
            if (input.files && input.files.length > 0) {
                nameDisplay.innerText = "ไฟล์ที่เลือก: " + input.files[0].name;
            } else {
                nameDisplay.innerText = "ยังไม่ได้เลือกไฟล์";
            }
        }

        // ตัวอย่างฟังก์ชันสำหรับส่งไฟล์ไปประมวลผลต่อ
        function processSelectedFile() {
            const activeInput = currentPlatform === 'android' 
                ? document.getElementById('input-android') 
                : document.getElementById('input-ios');

            if (activeInput.files && activeInput.files.length > 0) {
                alert(`โหลดไฟล์ [${activeInput.files[0].name}] สำหรับระบบ ${currentPlatform.toUpperCase()} เรียบร้อยแล้ว`);
            } else {
                alert('กรุณาเลือกไฟล์ก่อนทำการกดดำเนินการ');
            }
        }
    </script>

</body>
</html>
