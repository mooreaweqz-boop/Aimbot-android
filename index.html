<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POOH x KAO ADxIOS</title>
    
    <!-- ดึงฟอนต์ Mali จาก Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Mali", cursive, sans-serif !important;
            font-weight: 600;
        }

        body {
            background: #050508;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* -----------------------------------------
           [1] ROTATING LOGO ANIMATION (เอฟเฟกต์ไฟหมุน)
        ----------------------------------------- */
        .logo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, #ef4444, #00f0ff, transparent 60%);
            animation: rotateGlow 2.5s linear infinite;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-inner {
            position: relative;
            width: 112px;
            height: 112px;
            border-radius: 50%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 1;
        }

        .logo-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* -----------------------------------------
           [2] AUTHENTICATION UI (หน้ากรอกคีย์)
        ----------------------------------------- */
        .auth-card {
            width: 100%;
            max-width: 380px;
            background: rgba(12, 12, 16, 0.95);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 0 0 35px rgba(239, 68, 68, 0.15);
            text-align: center;
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }
        .brand-title span { color: #ef4444; }

        .welcome-subtext {
            color: #fca5a5;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .key-input {
            width: 100%;
            padding: 16px;
            background: rgba(22, 22, 28, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 0.95rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .key-input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #dc2626, #ef4444);
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.5);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(239, 68, 68, 0.7);
        }

        /* -----------------------------------------
           [3] DASHBOARD UI (หน้าเลือกไฟล์)
        ----------------------------------------- */
        .main-card {
            display: none; /* ซ่อนไว้ก่อน ย้อนสลับเมื่อคีย์ผ่าน */
            width: 100%;
            max-width: 420px;
            background: rgba(13, 27, 42, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.25);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .main-header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .main-header h2 {
            font-size: 1.4rem;
            color: #ffffff;
        }

        .timer-badge {
            margin-top: 8px;
            padding: 6px 14px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 10px;
            font-size: 0.85rem;
            color: #00f0ff;
            display: inline-block;
        }

        .btn-logout {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s;
            text-align: center;
        }

        .mode-btn.active {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .platform-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .platform-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .platform-btn.active {
            background: rgba(0, 240, 255, 0.15);
            border-color: #00f0ff;
            color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .drop-zone {
            border: 2px dashed rgba(0, 240, 255, 0.3);
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            background: rgba(0, 240, 255, 0.01);
            transition: 0.3s;
        }

        .drop-zone:hover {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.05);
        }

        .file-info {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #38bdf8;
        }

        .hidden-input { display: none; }

        .btn-action {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(90deg, #0284c7, #00f0ff);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
    </style>
</head>
<body>

    <!-- [1] หน้ากรอกคีย์ -->
    <div class="auth-card" id="auth-screen">
        <div class="logo-wrapper">
            <div class="logo-inner">
                <img src="https://cdn.discordapp.com/attachments/1528247158069792863/1528249908845351042/IMG_1880.png" alt="Logo">
            </div>
        </div>

        <div class="brand-title">POOH x KAO <span>ADxIOS</span></div>
        <div class="welcome-subtext">✨ ยินดีต้อนรับ! กรุณายืนยันตัวตนนะ ✨</div>

        <input type="text" class="key-input" id="access-key" placeholder="🔑 กรอกคีย์เปิดใช้งานระบบที่นี่">
        <button class="btn-submit" onclick="verifyKey()">เปิดระบบเลยยย 🚀</button>
    </div>

    <!-- [2] หน้า Dashboard -->
    <div class="main-card" id="main-screen">
        <div class="main-header">
            <h2>POOH x KAO DASHBOARD</h2>
            <div class="timer-badge">
                เวลาคงเหลือ: <span id="countdown-text">กำลังโหลด...</span>
            </div>
            <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
        </div>

        <!-- ตัวเลือกโหมดฟังก์ชัน -->
        <div class="mode-selector">
            <button class="mode-btn active" id="mode-vipff" onclick="selectMode('VIPFF')">VIPFF</button>
            <button class="mode-btn" id="mode-vipffm" onclick="selectMode('VIPFFM')">VIPFFM</button>
            <button class="mode-btn" id="mode-vipfps" onclick="selectMode('VIPFPS')">VIPFPS</button>
        </div>

        <!-- ตัวเลือกแพลตฟอร์ม -->
        <div class="platform-selector">
            <button class="platform-btn active" id="btn-android" onclick="setPlatform('android')">🤖 Android</button>
            <button class="platform-btn" id="btn-ios" onclick="setPlatform('ios')">🍎 iOS</button>
        </div>

        <!-- โซนเลือกไฟล์ -->
        <div class="drop-zone" onclick="openFilePicker()">
            <div style="font-size: 1.8rem; margin-bottom: 5px;">📁</div>
            <div>เลือกไฟล์สำหรับระบบ <span id="current-platform" style="color:#00f0ff; font-weight:bold;">Android</span></div>
            <div class="file-info" id="file-name-display">ยังไม่ได้เลือกไฟล์</div>
        </div>

        <input type="file" id="input-android" class="hidden-input" accept=".zip,.bin,.json" onchange="handleFileSelect(this)">
        <input type="file" id="input-ios" class="hidden-input" accept=".zip,.plist,.json" onchange="handleFileSelect(this)">

        <button class="btn-action" onclick="runFile()">▶ รันไฟล์ที่เลือก</button>
    </div>

    <!-- -----------------------------------------
       JAVASCRIPT LOGIC
    ----------------------------------------- -->
    <script>
        let currentPlatform = 'android';
        let currentMode = 'VIPFF';
        let countdownTimer = null;
        
        // รูปแบบคีย์: pooh-[ตัวเลข](day|hr|inf)-proxy[ตัวเลข 1-10 หลัก]
        const keyPattern = /^pooh-(\d*)(day|hr|inf)-proxy\d{1,10}$/;

        window.onload = function() {
            checkExistingSession();
        };

        // ตรวจสอบคีย์ที่เคยบันทึกไว้เมื่อเปิดหน้าเว็บ
        function checkExistingSession() {
            const savedKey = localStorage.getItem('active_key');
            const savedExpiry = localStorage.getItem('key_expiry_time');

            if (savedKey && savedExpiry) {
                if (savedExpiry === 'inf') {
                    showMainScreen('inf');
                } else {
                    const remaining = parseInt(savedExpiry) - new Date().getTime();
                    if (remaining > 0) {
                        showMainScreen(parseInt(savedExpiry));
                    } else {
                        invalidateKey();
                    }
                }
            }
        }

        // ฟังก์ชันยืนยันคีย์เมื่อกดปุ่ม
        function verifyKey() {
            const inputVal = document.getElementById('access-key').value.trim();
            const match = inputVal.match(keyPattern);

            if (match) {
                const amountStr = match[1];
                const unit = match[2];
                let expiryTime;

                if (unit === 'inf') {
                    expiryTime = 'inf';
                } else {
                    const amount = amountStr ? parseInt(amountStr) : 1;
                    let durationMs = 0;
                    if (unit === 'day') durationMs = amount * 24 * 60 * 60 * 1000;
                    else if (unit === 'hr') durationMs = amount * 60 * 60 * 1000;
                    
                    expiryTime = new Date().getTime() + durationMs;
                }

                localStorage.setItem('active_key', inputVal);
                localStorage.setItem('key_expiry_time', expiryTime);
                showMainScreen(expiryTime);
            } else {
                alert('รูปแบบคีย์ไม่ถูกต้อง! กรุณาตรวจสอบและลองใหม่อีกครั้ง');
            }
        }

        // ฟังก์ชันสั่งเปลี่ยนหน้าจอไปยัง Dashboard
        function showMainScreen(expiryTime) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            startCountdown(expiryTime);
        }

        // นับเวลาถอยหลังของคีย์
        function startCountdown(expiryTime) {
            if (countdownTimer) clearInterval(countdownTimer);

            if (expiryTime === 'inf') {
                document.getElementById('countdown-text').innerText = 'ถาวร (ตลอดชีพ)';
                return;
            }

            function updateDisplay() {
                const now = new Date().getTime();
                const distance = expiryTime - now;

                if (distance <= 0) {
                    clearInterval(countdownTimer);
                    alert('เวลาการใช้งานของคุณหมดอายุแล้ว!');
                    invalidateKey();
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                let text = "";
                if (days > 0) text += days + " วัน ";
                if (hours > 0 || days > 0) text += hours + " ชม. ";
                text += minutes + " นาที " + seconds + " วินาที";

                document.getElementById('countdown-text').innerText = text;
            }

            updateDisplay();
            countdownTimer = setInterval(updateDisplay, 1000);
        }

        // ล้างสิทธิ์การใช้งานเมื่อหมดเวลาหรือออกจากระบบ
        function invalidateKey() {
            localStorage.removeItem('active_key');
            localStorage.removeItem('key_expiry_time');
            if (countdownTimer) clearInterval(countdownTimer);
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('access-key').value = '';
        }

        function logout() {
            invalidateKey();
        }

        // ฟังก์ชันสลับโหมด (VIPFF, VIPFFM, VIPFPS)
        function selectMode(modeName) {
            currentMode = modeName;
            document.getElementById('mode-vipff').classList.toggle('active', modeName === 'VIPFF');
            document.getElementById('mode-vipffm').classList.toggle('active', modeName === 'VIPFFM');
            document.getElementById('mode-vipfps').classList.toggle('active', modeName === 'VIPFPS');
        }

        // ฟังก์ชันสลับแพลตฟอร์ม (Android, iOS)
        function setPlatform(platform) {
            currentPlatform = platform;
            document.getElementById('btn-android').classList.toggle('active', platform === 'android');
            document.getElementById('btn-ios').classList.toggle('active', platform === 'ios');
            document.getElementById('current-platform').innerText = platform === 'android' ? 'Android' : 'iOS';
            document.getElementById('file-name-display').innerText = 'ยังไม่ได้เลือกไฟล์';
        }

        function openFilePicker() {
            if (currentPlatform === 'android') {
                document.getElementById('input-android').click();
            } else {
                document.getElementById('input-ios').click();
            }
        }

        function handleFileSelect(input) {
            const display = document.getElementById('file-name-display');
            if (input.files && input.files.length > 0) {
                display.innerText = "ไฟล์ที่เลือก: " + input.files[0].name;
            } else {
                display.innerText = "ยังไม่ได้เลือกไฟล์";
            }
        }

        function runFile() {
            const input = currentPlatform === 'android' 
                ? document.getElementById('input-android') 
                : document.getElementById('input-ios');

            if (input.files && input.files.length > 0) {
                alert(`กำลังประมวลผลไฟล์ ${input.files[0].name}\nโหมด: ${currentMode}\nระบบ: ${currentPlatform.toUpperCase()}`);
            } else {
                alert('กรุณาเลือกไฟล์ก่อนกดรัน');
            }
        }
    </script>
</body>
</html>
